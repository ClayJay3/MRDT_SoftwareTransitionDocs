server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docusaurus emits clean directory-style URLs (/foundations/network/).
    # Try the file, then the directory, then a .html fallback, then the 404 page.
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    # Long-cache the fingerprinted assets, never cache HTML.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }
}
